<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚕️ MEDICAL DIAGNOSTIC SCAN ⚕️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .scanner-container {
            max-width: 1000px;
            width: 100%;
            background: #030614;
            border: 3px solid #00ff9d;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        /* SCANNER ANIMATION */
        .scan-line {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 157, 0.2), transparent);
            animation: scan 2.5s ease-in-out forwards;
            pointer-events: none;
            z-index: 10;
        }
        
        @keyframes scan {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: #00ff9d;
            border-bottom: 2px solid #00ff9d;
            padding-bottom: 15px;
        }
        
        .title {
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00ff9d;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .led {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #00ff9d;
            box-shadow: 0 0 20px #00ff9d;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* PROGRESS BAR */
        .progress-section {
            margin: 30px 0;
            display: none;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #1a1f35;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #00ff9d;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff9d, #00cc7a);
            transition: width 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .progress-text {
            text-align: center;
            color: #00ff9d;
            margin-top: 10px;
            font-size: 1.2rem;
        }
        
        /* SCANNING LINES ANIMATION */
        .scanning-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 157, 0.05) 2px,
                rgba(0, 255, 157, 0.05) 4px
            );
            pointer-events: none;
            animation: scanlines 8s linear infinite;
            z-index: 5;
        }
        
        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(20px); }
        }
        
        /* MAIN CONTENT (HIDDEN INITIALLY) */
        .main-content {
            display: none;
            position: relative;
            z-index: 20;
        }
        
        .patient-info {
            background: #0f1425;
            border: 2px solid #00ff9d;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            color: #fff;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            color: #00ff9d;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .info-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
        }
        
        /* 3D BODY MODEL CONTAINER */
        .body-container {
            display: flex;
            gap: 30px;
            margin: 30px 0;
            background: #0f1425;
            border: 2px solid #00ff9d;
            border-radius: 20px;
            padding: 20px;
        }
        
        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0f1e;
            border-radius: 15px;
            padding: 10px;
        }
        
        canvas#bodyCanvas {
            width: 100%;
            max-width: 280px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(0, 255, 157, 0.3));
        }
        
        .diagnosis-panel {
            flex: 1;
            color: #fff;
        }
        
        .diagnosis-title {
            color: #00ff9d;
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .condition-list {
            list-style: none;
            padding: 0;
        }
        
        .condition-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #1a1f35;
            border-left: 4px solid #ff3366;
            border-radius: 5px;
            font-size: 1rem;
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .condition-item:nth-child(1) { animation-delay: 0.1s; }
        .condition-item:nth-child(2) { animation-delay: 0.2s; }
        .condition-item:nth-child(3) { animation-delay: 0.3s; }
        
        .severity {
            display: inline-block;
            margin-left: 10px;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            background: #ff3366;
            color: white;
        }
        
        .doctor-notes {
            margin-top: 30px;
            background: #0f1425;
            border: 2px solid #00ff9d;
            border-radius: 20px;
            padding: 20px;
            color: #fff;
        }
        
        .notes-title {
            color: #00ff9d;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        
        textarea {
            width: 100%;
            height: 100px;
            background: #1a1f35;
            border: 2px solid #00ff9d;
            border-radius: 10px;
            color: #fff;
            padding: 10px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }
        
        .clinic-signature {
            text-align: center;
            margin-top: 30px;
            color: #00ff9d;
            font-size: 1.2rem;
            border-top: 2px solid #00ff9d;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="scanner-container" id="scanner">
        <div class="scan-line"></div>
        <div class="scanning-overlay"></div>
        
        <div class="header">
            <div class="title">🔬 MEDISCAN v2.0 🔬</div>
            <div class="status">
                <span>USB DIAGNOSTIC MODE</span>
                <div class="led"></div>
            </div>
        </div>
        
        <!-- PROGRESS SECTION -->
        <div class="progress-section" id="progressSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Initializing scan...</div>
        </div>
        
        <!-- MAIN CONTENT (AFTER SCAN) -->
        <div class="main-content" id="mainContent">
            <div class="patient-info">
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">PATIENT NAME</span>
                        <span class="info-value" id="patientName">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">DATE OF BIRTH</span>
                        <span class="info-value" id="patientDob">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">ZODIAC SIGN</span>
                        <span class="info-value" id="patientZodiac">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">SCAN ID</span>
                        <span class="info-value" id="scanId">---</span>
                    </div>
                </div>
            </div>
            
            <!-- 3D BODY MODEL + DIAGNOSIS -->
            <div class="body-container">
                <div class="canvas-container">
                    <canvas id="bodyCanvas" width="280" height="380"></canvas>
                </div>
                <div class="diagnosis-panel">
                    <div class="diagnosis-title">⚠️ DETECTED CONDITIONS ⚠️</div>
                    <ul class="condition-list" id="conditionList">
                        <!-- Filled by JavaScript -->
                    </ul>
                </div>
            </div>
            
            <!-- DOCTOR'S NOTES -->
            <div class="doctor-notes">
                <div class="notes-title">📋 DOCTOR'S NOTES (REQUIRED)</div>
                <textarea placeholder="Enter clinical observations..."></textarea>
            </div>
            
            <div class="clinic-signature">
                🌿 DR WILLIMA HERBAL CLINIC • OFFICIAL DIAGNOSTIC REPORT 🌿
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // ZODIAC HEALTH DATA (BY BIRTH MONTH)
        // ============================================
        const zodiacHealthData = {

                ],

                ],
                bodyPoints: [[0.45,0.27], [0.55,0.27], [0.5,0.25], [0.5,0.2]] // heart, upper spine
            },
            "September": {

                conditions: [
                    "🔴 INTESTINES: Malabsorption, leaky gut",
                    "🔴 DIGESTIVE: Chronic constipation",

                    "🟡 NERVES: Visceral hypersensitivity",

                ],

            },

                conditions: [

                ],

            },
            "November": {
                sign: "Scorpio ♏",
                conditions: [
                    "🔴 REPRODUCTIVE: Hormonal imbalance",
                    "🔴 PELVIS: Congestion, inflammation",
                    "🟡 BLADDER: Urinary retention",
                    "🟡 COLON: Diverticulosis risk",
                    "🟢 SACRUM: Strong, stable"
                ],
                bodyPoints: [[0.5,0.6], [0.48,0.58], [0.52,0.58], [0.5,0.62]] // pelvis, reproductive
            },
            "December": {
                sign: "Sagittarius ♐",
                conditions: [
                    "🔴 HIPS: Arthritis, bursitis",
                    "🔴 THIGHS: Muscle strains",
                    "🟡 SCIATICA: Nerve compression",
                    "🟡 LIVER: Detoxification sluggish",
                    "🟢 FEMUR: Strong bone density"
                ],
                bodyPoints: [[0.45,0.65], [0.55,0.65], [0.5,0.7], [0.48,0.68]] // hips, upper legs
            }
        };

        // ============================================
        // 3D BODY DRAWING FUNCTION
        // ============================================
        function draw3DBody(month) {
            const canvas = document.getElementById('bodyCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            
            ctx.clearRect(0, 0, w, h);
            
            // Background glow
            ctx.shadowColor = '#00ff9d';
            ctx.shadowBlur = 20;
            
            // Draw 3D body with gradients
            // Head
            ctx.beginPath();
            ctx.ellipse(w*0.5, h*0.1, w*0.1, h*0.08, 0, 0, Math.PI*2);
            ctx.fillStyle = '#2a3f5e';
            ctx.fill();
            ctx.strokeStyle = '#00ff9d';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Neck
            ctx.fillStyle = '#1f314a';
            ctx.fillRect(w*0.46, h*0.15, w*0.08, h*0.05);
            ctx.strokeRect(w*0.46, h*0.15, w*0.08, h*0.05);
            
            // Torso (with 3D effect)
            const torsoGrad = ctx.createLinearGradient(w*0.3, h*0.2, w*0.7, h*0.6);
            torsoGrad.addColorStop(0, '#2a3f5e');
            torsoGrad.addColorStop(1, '#1a2c42');
            ctx.fillStyle = torsoGrad;
            ctx.beginPath();
            ctx.moveTo(w*0.3, h*0.2);
            ctx.lineTo(w*0.7, h*0.2);
            ctx.lineTo(w*0.65, h*0.6);
            ctx.lineTo(w*0.35, h*0.6);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // Arms
            ctx.fillStyle = '#2a3f5e';
            // Left arm
            ctx.beginPath();
            ctx.moveTo(w*0.3, h*0.2);
            ctx.lineTo(w*0.2, h*0.3);
            ctx.lineTo(w*0.18, h*0.4);
            ctx.lineTo(w*0.25, h*0.42);
            ctx.lineTo(w*0.3, h*0.3);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // Right arm
            ctx.beginPath();
            ctx.moveTo(w*0.7, h*0.2);
            ctx.lineTo(w*0.8, h*0.3);
            ctx.lineTo(w*0.82, h*0.4);
            ctx.lineTo(w*0.75, h*0.42);
            ctx.lineTo(w*0.7, h*0.3);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // Legs
            ctx.fillStyle = '#1f314a';
            // Left leg
            ctx.fillRect(w*0.4, h*0.6, w*0.08, h*0.25);
            ctx.strokeRect(w*0.4, h*0.6, w*0.08, h*0.25);
            // Right leg
            ctx.fillRect(w*0.52, h*0.6, w*0.08, h*0.25);
            ctx.strokeRect(w*0.52, h*0.6, w*0.08, h*0.25);
            
            // Draw glowing dots for affected areas
            const data = zodiacHealthData[month];
            if (data && data.bodyPoints) {
                data.bodyPoints.forEach(point => {
                    const [x, y] = point;
                    
                    // Outer glow
                    ctx.shadowBlur = 30;
                    ctx.fillStyle = '#ff3366';
                    ctx.globalAlpha = 0.3;
                    ctx.beginPath();
                    ctx.arc(x * w, y * h, 12, 0, Math.PI*2);
                    ctx.fill();
                    
                    // Inner core
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = '#ff3366';
                    ctx.globalAlpha = 1;
                    ctx.beginPath();
                    ctx.arc(x * w, y * h, 6, 0, Math.PI*2);
                    ctx.fill();
                    
                    // Center
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(x * w - 2, y * h - 2, 2, 0, Math.PI*2);
                    ctx.fill();
                });
            }
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }

        // ============================================
        // SIMULATE USB SCAN
        // ============================================
        function startScan() {
            const progressSection = document.getElementById('progressSection');
            const mainContent = document.getElementById('mainContent');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            progressSection.style.display = 'block';
            
            let progress = 0;
            const steps = [
                "Initializing USB interface...",
                "Scanning biometric data...",
                "Analyzing genetic markers...",
                "Cross-referencing zodiac database...",
                "Processing 3D body mapping...",
                "Generating diagnostic report..."
            ];
            
            const interval = setInterval(() => {
                progress += 2;
                progressFill.style.width = progress + '%';
                
                const stepIndex = Math.floor(progress / (100 / steps.length));
                if (stepIndex < steps.length) {
                    progressText.textContent = steps[stepIndex];
                }
                
                if (progress >= 100) {
                    clearInterval(interval);
                    progressText.textContent = "SCAN COMPLETE!";
                    
                    setTimeout(() => {
                        progressSection.style.display = 'none';
                        mainContent.style.display = 'block';
                    }, 1000);
                }
            }, 100);
        }

        // ============================================
        // GET ZODIAC FROM BIRTH MONTH
        // ============================================
        function getZodiacFromMonth(month) {
            const monthNames = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];
            return monthNames[month];
        }

        // ============================================
        // GENERATE RANDOM PATIENT DATA
        // ============================================
        function generatePatientData() {
            const firstNames = ["James", "John", "Robert", "Michael", "William", "David", "Richard", "Joseph", "Thomas", "Charles"];
            const lastNames = ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis", "Rodriguez", "Martinez"];
            
            const firstName = firstNames[Math.floor(Math.random() * firstNames.length)];
            const lastName = lastNames[Math.floor(Math.random() * lastNames.length)];
            const age = Math.floor(Math.random() * 30) + 25; // 25-55
            
            const month = Math.floor(Math.random() * 12);
            const day = Math.floor(Math.random() * 28) + 1;
            const year = 2026 - age;
            
            return {
                name: `${firstName} ${lastName}`,
                dob: `${month + 1}/${day}/${year}`,
                month: getZodiacFromMonth(month),
                age: age,
                scanId: `SCAN-${Math.floor(Math.random() * 10000)}-${Date.now().toString().slice(-4)}`
            };
        }

        // ============================================
        // UPDATE DISPLAY WITH PATIENT DATA
        // ============================================
        function updateDisplay(patientData) {
            document.getElementById('patientName').textContent = patientData.name;
            document.getElementById('patientDob').textContent = patientData.dob;
            document.getElementById('patientZodiac').textContent = zodiacHealthData[patientData.month].sign;
            document.getElementById('scanId').textContent = patientData.scanId;
            
            // Update conditions list
            const conditionList = document.getElementById('conditionList');
            conditionList.innerHTML = '';
            zodiacHealthData[patientData.month].conditions.forEach(condition => {
                const li = document.createElement('li');
                li.className = 'condition-item';
                li.textContent = condition;
                conditionList.appendChild(li);
            });
            
            // Update body diagram
            draw3DBody(patientData.month);
        }

        // ============================================
        // INITIALIZE
        // ============================================
        window.addEventListener('load', () => {
            // Start scan immediately (simulating USB detection)
            startScan();
            
            // Generate random patient data after scan
            setTimeout(() => {
                const patientData = generatePatientData();
                updateDisplay(patientData);
            }, 6000);
        });
    </script>
</body>
</html>
