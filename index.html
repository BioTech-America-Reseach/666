    // ----- helper: get zodiac from year (Chinese zodiac, 12-year cycle) -----
    function getZodiacFromYear(year) {
        if (isNaN(year) || year < 1900 || year > 2100) year = 2000; // fallback
        // 2020 is Rat, 2021 Ox, 2022 Tiger, 2023 Rabbit, 2024 Dragon, 2025 Snake,
        // 2026 Horse, 2027 Goat, 2028 Monkey, 2029 Rooster, 2030 Dog, 2031 Pig
        const zodiacs = [
            "Rat", "Ox", "Tiger", "Rabbit", "Dragon", "Snake",
            "Horse", "Goat", "Monkey", "Rooster", "Dog", "Pig"
        ];
        // offset: 2020 -> Rat (index 0)
        const startYear = 2020;
        const diff = year - startYear;
        let index = diff % 12;
        if (index < 0) index += 12;
        return zodiacs[index];
    }

    // Helper to get patient problems (20 points from health+danger)
    function getPatientProblems(zodiac) {
        const data = zodiacData[zodiac];
        if (!data) return [];
        const healthArr = data.health.split(',').map(s => s.trim()).filter(s => s && !s.includes('(20 health)'));
        const dangerArr = data.danger.split(',').map(s => s.trim()).filter(s => s && !s.includes('(20 danger)'));
        const combined = [...healthArr, ...dangerArr];
        const unique = [...new Set(combined)];
        return unique.slice(0, 20);
    }

    // ------------------------------------------------------------------
    // 3D-style human body drawing with gradients and shading
    // ------------------------------------------------------------------
    function draw3DBody(ctx, w, h) {
        ctx.clearRect(0, 0, w, h);

        // soft gradient background
        const bgGrad = ctx.createLinearGradient(0, 0, w, h);
        bgGrad.addColorStop(0, '#e8f0f7');
        bgGrad.addColorStop(1, '#d4e3f0');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, w, h);

        // ========== TORSO (with 3D shading) ==========
        // main torso shape (pear-like, more anatomical)
        ctx.save();

        // shadow under torso
        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 3;

        // Torso gradient (light from left)
        const torsoGrad = ctx.createLinearGradient(w*0.2, h*0.2, w*0.8, h*0.6);
        torsoGrad.addColorStop(0, '#f9d9c0');
        torsoGrad.addColorStop(0.5, '#e0b89c');
        torsoGrad.addColorStop(1, '#c49a7c');
        ctx.fillStyle = torsoGrad;

        ctx.beginPath();
        ctx.moveTo(w*0.3, h*0.22);   // left shoulder
        ctx.lineTo(w*0.7, h*0.22);   // right shoulder
        ctx.lineTo(w*0.68, h*0.55);  // right hip
        ctx.lineTo(w*0.55, h*0.6);   // slight curve
        ctx.lineTo(w*0.45, h*0.6);
        ctx.lineTo(w*0.32, h*0.55);  // left hip
        ctx.closePath();
        ctx.fill();

        // add subtle highlight on chest
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = '#fff7f0';
        ctx.beginPath();
        ctx.moveTo(w*0.4, h*0.25);
        ctx.lineTo(w*0.6, h*0.25);
        ctx.lineTo(w*0.58, h*0.4);
        ctx.lineTo(w*0.42, h*0.4);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1.0;

        // ========== HEAD (3D sphere) ==========
        ctx.shadowColor = 'rgba(0,0,0,0.15)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 2;

        const headGrad = ctx.createRadialGradient(w*0.5-5, h*0.1-3, 5, w*0.5, h*0.1, h*0.1);
        headGrad.addColorStop(0, '#fce6d5');
        headGrad.addColorStop(0.7, '#d9af91');
        ctx.fillStyle = headGrad;
        ctx.beginPath();
        ctx.ellipse(w*0.5, h*0.1, h*0.06, h*0.07, 0, 0, 2*Math.PI);
        ctx.fill();

        // neck (shaded)
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#c49a7c';
        ctx.beginPath();
        ctx.rect(w*0.47, h*0.15, w*0.06, h*0.07);
        ctx.fill();

        // ========== ARMS ==========
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#e0b89c';
        // left arm
        ctx.beginPath();
        ctx.moveTo(w*0.3, h*0.22);
        ctx.lineTo(w*0.2, h*0.32);
        ctx.lineTo(w*0.18, h*0.42);
        ctx.lineTo(w*0.22, h*0.45);
        ctx.lineTo(w*0.28, h*0.38);
        ctx.lineTo(w*0.32, h*0.28);
        ctx.closePath();
        ctx.fill();

        // right arm
        ctx.beginPath();
        ctx.moveTo(w*0.7, h*0.22);
        ctx.lineTo(w*0.8, h*0.32);
        ctx.lineTo(w*0.82, h*0.42);
        ctx.lineTo(w*0.78, h*0.45);
        ctx.lineTo(w*0.72, h*0.38);
        ctx.lineTo(w*0.68, h*0.28);
        ctx.closePath();
        ctx.fill();

        // ========== LEGS ==========
        ctx.fillStyle = '#c49a7c';
        // left leg
        ctx.beginPath();
        ctx.moveTo(w*0.4, h*0.55);
        ctx.lineTo(w*0.38, h*0.72);
        ctx.lineTo(w*0.35, h*0.85);
        ctx.lineTo(w*0.4, h*0.88);
        ctx.lineTo(w*0.42, h*0.75);
        ctx.lineTo(w*0.44, h*0.58);
        ctx.closePath();
        ctx.fill();

        // right leg
        ctx.beginPath();
        ctx.moveTo(w*0.6, h*0.55);
        ctx.lineTo(w*0.62, h*0.72);
        ctx.lineTo(w*0.65, h*0.85);
        ctx.lineTo(w*0.6, h*0.88);
        ctx.lineTo(w*0.58, h*0.75);
        ctx.lineTo(w*0.56, h*0.58);
        ctx.closePath();
        ctx.fill();

        // waist/hip line (shadow)
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#a47e64';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(w*0.35, h*0.55);
        ctx.lineTo(w*0.65, h*0.55);
        ctx.stroke();

        // facial features (simple 3D)
        ctx.fillStyle = '#3e2b1f';
        ctx.shadowBlur = 4;
        // left eye
        ctx.beginPath();
        ctx.arc(w*0.47, h*0.08, 2, 0, 2*Math.PI);
        ctx.fill();
        // right eye
        ctx.beginPath();
        ctx.arc(w*0.53, h*0.08, 2, 0, 2*Math.PI);
        ctx.fill();
        // nose
        ctx.beginPath();
        ctx.arc(w*0.5, h*0.1, 1.5, 0, 2*Math.PI);
        ctx.fill();

        ctx.restore();

        // reset shadow
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
    }

    // draw red dots for given zodiac
    function drawZodiacDots(zodiac) {
        const canvas = document.getElementById('bodyCanvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;

        // redraw 3D body first
        draw3DBody(ctx, w, h);

        // get points for zodiac
        const points = zodiacBodyPoints[zodiac] || [];
        ctx.fillStyle = '#e63946';
        ctx.shadowColor = '#b0302a';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        points.forEach(([x, y]) => {
            // outer glow
            ctx.beginPath();
            ctx.arc(x * w, y * h, 10, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(230,57,70,0.3)';
            ctx.fill();
            // main dot
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#e63946';
            ctx.beginPath();
            ctx.arc(x * w, y * h, 7, 0, 2 * Math.PI);
            ctx.fill();
            // inner highlight
            ctx.shadowBlur = 8;
            ctx.fillStyle = '#ff8a8a';
            ctx.beginPath();
            ctx.arc(x * w - 1, y * h - 1, 3, 0, 2 * Math.PI);
            ctx.fill();
        });
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
    }

    // update entire report
    function updateReport() {
        const name = document.getElementById('patientName').value.trim() || '—';
        const age = document.getElementById('patientAge').value.trim() || '—';
        const year = parseInt(document.getElementById('birthYear').value, 10);
        const zodiac = getZodiacFromYear(year);

        document.getElementById('dispName').innerText = name;
        document.getElementById('dispAge').innerText = age;
        document.getElementById('dispZodiac').innerHTML = `🐾 ${zodiac.toUpperCase()}`;

        const problems = getPatientProblems(zodiac);
        const listEl = document.getElementById('problemsList');
        listEl.innerHTML = '';
        problems.forEach(p => {
            const li = document.createElement('li');
            li.textContent = '• ' + p;
            listEl.appendChild(li);
        });
        // pad if less than 20 (shouldn't happen)
        for (let i = problems.length; i < 20; i++) {
            const li = document.createElement('li');
            li.textContent = '• ';
            li.style.opacity = '0.3';
            listEl.appendChild(li);
        }

        // update body diagram dots
        drawZodiacDots(zodiac);
    }

    // initial load
    updateReport();

    // generate button
    document.getElementById('generateBtn').addEventListener('click', updateReport);

    // print button
    document.getElementById('printBtn').addEventListener('click', () => {
        window.print();
    });

    // clinic name fixed
    document.getElementById('clinicName').value = 'DR WILLIMA HERBAL CLINIC';
})();
</script>
